<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>When · A Date Parser</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f7f3eb;
    --ink: #14110d;
    --ink-2: #4a4338;
    --muted: #8a7e6a;
    --rule: #d8cdb5;
    --rule-2: #ebe2cc;
    --accent: #b03524;
    --ok: #2e7d4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 12vh 24px 80px;
    line-height: 1.4;
  }
  ::selection { background: var(--ink); color: var(--bg); }

  .app { width: min(640px, 100%); }

  /* Input row */
  .input-row {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: baseline;
    gap: 14px;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 14px;
  }
  .prompt {
    font-family: 'Fraunces', serif;
    font-size: 30px;
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
    line-height: 1;
    user-select: none;
    transform: translateY(2px);
  }
  .qbox {
    position: relative;
    width: 100%;
    min-width: 0;
  }
  #q, .qbox .shadow {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 100, 'wght' 400;
    font-size: 32px;
    letter-spacing: -.015em;
    line-height: 1.4;
    padding: 0;
  }
  #q {
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--ink);
    width: 100%;
    caret-color: var(--accent);
    position: relative;
    z-index: 1;
    display: block;
  }
  #q::placeholder {
    color: var(--muted);
    font-style: italic;
    font-variation-settings: 'opsz' 100, 'wght' 300;
  }
  .qbox .shadow {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    white-space: pre;
    color: transparent;
    z-index: 0;
  }
  .qbox .shadow .typed { visibility: hidden; }
  .qbox .shadow .ghost {
    color: var(--muted);
    font-style: italic;
    font-variation-settings: 'opsz' 100, 'wght' 300;
    opacity: .55;
  }
  .qbox .shadow .ghost:not(:empty)::after {
    content: '↹';
    margin-left: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    opacity: .7;
    vertical-align: 4px;
    font-style: normal;
  }
  /* "Did you mean" suggestion chip */
  .hint-btn {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-variation-settings: 'opsz' 60, 'wght' 500;
    font-size: 20px;
    color: var(--accent);
    background: transparent;
    border: 0;
    border-bottom: 1px dashed var(--accent);
    cursor: pointer;
    padding: 0 1px;
    transition: background .15s, color .15s;
  }
  .hint-btn:hover { background: var(--accent); color: var(--bg); }

  /* Result row */
  .result {
    margin-top: 18px;
    min-height: 36px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    font-family: 'Fraunces', serif;
  }
  .result .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: .22em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--ink);
    color: var(--bg);
  }
  .result .badge.err { background: var(--accent); }
  .result .badge.warn { background: transparent; color: var(--muted); border: 1px solid var(--rule); }
  .result .when {
    font-variation-settings: 'opsz' 60, 'wght' 400;
    font-size: 22px;
    letter-spacing: -.005em;
  }
  .result .when .dim { color: var(--muted); }
  .result .when em { font-style: italic; color: var(--accent); font-weight: 500; }
  .result .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: .06em;
    color: var(--muted);
    margin-left: auto;
  }

  /* Calendar strip — vertical stack: start month on top, end month on bottom */
  .cal-strip {
    margin-top: 24px;
    border-top: 1px solid var(--rule);
    padding-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: stretch;
  }
  .cal-strip.panels-gap { gap: 0; }
  .cal-strip.panels-2 .cell,
  .cal-strip.panels-gap .cell { aspect-ratio: 1 / .55; font-size: 14px; }
  .cal-strip.panels-2 .panel,
  .cal-strip.panels-gap .panel {
    width: min(520px, 100%);
    margin: 0 auto;
  }

  .panel { min-width: 0; }
  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }
  .panel-head .title {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 60, 'wght' 500;
    font-size: 16px;
    letter-spacing: -.005em;
  }
  .panel-head .title .yr { color: var(--muted); margin-left: 4px; font-weight: 400; }
  .panel-head .role {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .panel-head .role.start { color: var(--accent); }
  .panel-head .role.end { color: var(--accent); }

  .dow {
    display: grid;
    grid-template-columns: 28px repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .dow span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }
  .dow .w-head {
    text-align: right;
    padding-right: 6px;
    letter-spacing: 0;
    font-size: 8px;
  }
  .grid {
    display: grid;
    grid-template-columns: 28px repeat(7, 1fr);
    gap: 1px;
  }
  .week-num {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0;
    color: var(--muted);
    user-select: none;
  }
  .week-num.current {
    color: var(--accent);
    font-weight: 500;
  }

  /* Gap (elided months between range endpoints) — horizontal divider */
  .gap {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 0;
    color: var(--muted);
  }
  .gap::before, .gap::after {
    content: '';
    flex: 1;
    height: 1px;
    background: repeating-linear-gradient(to right, var(--rule) 0 4px, transparent 4px 8px);
  }
  .gap .dots { display: none; }
  .gap .n {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-variation-settings: 'opsz' 60, 'wght' 400;
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -.01em;
  }
  .gap .lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: .25em;
    text-transform: uppercase;
  }

  .cell {
    aspect-ratio: 1 / .8;
    border: 0;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 36, 'wght' 400;
    font-size: 15px;
    letter-spacing: -.005em;
    border-radius: 4px;
    position: relative;
    transition: background .15s, color .15s;
    user-select: none;
    touch-action: none;
  }
  .cell:hover { background: var(--rule-2); }
  .cell.outside { color: var(--muted); opacity: .55; }
  .cell.today { color: var(--accent); font-variation-settings: 'opsz' 36, 'wght' 500; }
  .cell.today::after {
    content: '';
    position: absolute;
    bottom: 6px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  .cell.selected {
    background: var(--ink);
    color: var(--bg);
    font-variation-settings: 'opsz' 36, 'wght' 500;
  }
  .cell.selected.today { color: var(--bg); }
  .cell.selected.today::after { background: var(--bg); }
  .cell.in-range {
    background: rgba(176,53,36,.10);
    border-radius: 0;
  }
  .cell.range-start, .cell.range-end {
    background: var(--accent);
    color: var(--bg);
    font-variation-settings: 'opsz' 36, 'wght' 500;
    cursor: grab;
  }
  .cell.range-start { border-radius: 4px 0 0 4px; }
  .cell.range-end { border-radius: 0 4px 4px 0; }
  .cell.range-start.range-end { border-radius: 4px; }
  .cell.range-start::after, .cell.range-end::after {
    content: '';
    position: absolute;
    top: 4px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,.7);
  }
  .cell.range-start::after { left: 4px; }
  .cell.range-end::after { right: 4px; }
  .cell.range-mid-row + .cell.in-range { border-radius: 0; }

  body.dragging,
  body.dragging * { cursor: grabbing !important; }
  body.dragging .cell { transition: none; }

  /* Scroll cue while dragging at top/bottom edge */
  .cal-strip { position: relative; }
  .cal-strip::before, .cal-strip::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 56px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s ease;
  }
  .cal-strip::before {
    top: 0;
    background: linear-gradient(to top, transparent, rgba(176,53,36,.10));
  }
  .cal-strip::after {
    bottom: 0;
    background: linear-gradient(to bottom, transparent, rgba(176,53,36,.10));
  }
  .cal-strip[data-scrolling="up"]::before { opacity: 1; }
  .cal-strip[data-scrolling="down"]::after { opacity: 1; }
  .cal-strip[data-scrolling]::before,
  .cal-strip[data-scrolling]::after {
    /* arrow */
  }
  .cal-strip .scroll-cue {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    transition: opacity .15s ease;
    pointer-events: none;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid rgba(176,53,36,.25);
    z-index: 2;
  }
  .cal-strip .scroll-cue.top { top: 6px; }
  .cal-strip .scroll-cue.bot { bottom: 6px; }
  .cal-strip[data-scrolling="up"] .scroll-cue.top { opacity: 1; }
  .cal-strip[data-scrolling="down"] .scroll-cue.bot { opacity: 1; }

  /* Examples */
  .examples {
    margin-top: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .ex {
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: .04em;
    color: var(--muted);
    padding: 5px 0;
    margin-right: 6px;
    border-bottom: 1px dotted var(--rule);
    transition: color .15s, border-color .15s;
  }
  .ex:hover { color: var(--accent); border-color: var(--accent); }

  /* Helper label */
  .meta-line {
    margin-top: 26px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 1px solid var(--rule);
    padding-top: 14px;
  }
  .meta-line .iso { color: var(--ink); }

  /* Tiny shake on parse error while typing */
  .input-row.err { animation: nudge .35s ease; }
  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }

  /* Result fade in */
  .result > * { animation: rise .35s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15120e;
      --ink: #ede2c8;
      --ink-2: #b8ad94;
      --muted: #7a7060;
      --rule: #2e2a23;
      --rule-2: #221f1a;
      --accent: #d96550;
    }
  }
</style>
</head>
<body>
  <main class="app">
    <div class="input-row" id="inputRow">
      <span class="prompt">›</span>
      <div class="qbox">
        <div class="shadow" aria-hidden="true"><span class="typed"></span><span class="ghost"></span></div>
        <input id="q" autocomplete="off" autocapitalize="off" spellcheck="false" autofocus
               placeholder="say when — try “yday to tmrw” or “next fri”" />
      </div>
    </div>

    <div class="result" id="result"></div>

    <div class="cal-strip" id="strip"></div>

    <div class="examples" id="examples">
      <button class="ex">today</button>
      <button class="ex">tmrw</button>
      <button class="ex">yday to tmrw</button>
      <button class="ex">next fri</button>
      <button class="ex">in 3 weeks</button>
      <button class="ex">2 mondays from now</button>
      <button class="ex">last 30 days</button>
      <button class="ex">this weekend</button>
      <button class="ex">weekend after next</button>
      <button class="ex">first mon of march</button>
      <button class="ex">end of month</button>
      <button class="ex">q4 2026</button>
      <button class="ex">christmas</button>
      <button class="ex">thanksgiving</button>
      <button class="ex">10 days before xmas</button>
      <button class="ex">today + 10 days</button>
      <button class="ex">next fri + 3 days</button>
      <button class="ex">may 12 – 19</button>
      <button class="ex">5/12/26</button>
      <button class="ex">+45</button>
    </div>

    <div class="meta-line">
      <span>When · a date parser</span>
      <span class="iso" id="isoLine">—</span>
    </div>
  </main>

<script>
'use strict';

/* ───────────────────────────── helpers ─────────────────────────── */

const MONTHS_SHORT = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];

function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d,n){
  const x=new Date(d);
  const day=x.getDate();
  x.setDate(1);
  x.setMonth(x.getMonth()+n);
  const last = new Date(x.getFullYear(), x.getMonth()+1, 0).getDate();
  x.setDate(Math.min(day,last));
  return x;
}
function addYears(d,n){ return addMonths(d, n*12); }
function sameDay(a,b){ return a&&b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function endOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function startOfWeekMon(d){ const dow=d.getDay(); const off=(dow+6)%7; return addDays(d,-off); }
function endOfWeekSun(d){ return addDays(startOfWeekMon(d), 6); }
const TODAY = startOfDay(new Date());

const pad = n => String(n).padStart(2,'0');
const fmtISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

function diffDays(a,b){ return Math.round((startOfDay(b) - startOfDay(a))/86400000); }

// ISO 8601 week number (Mon-based, week 1 contains Jan 4)
function isoWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dow = (t.getUTCDay() + 6) % 7;
  t.setUTCDate(t.getUTCDate() - dow + 3); // shift to Thursday of this week
  const yearStart = new Date(Date.UTC(t.getUTCFullYear(), 0, 4));
  return 1 + Math.round(((t - yearStart) / 86400000 - 3 + ((yearStart.getUTCDay() + 6) % 7)) / 7);
}
function weekStartOfYear(year, n) {
  const jan4 = new Date(year, 0, 4);
  const dow = (jan4.getDay() + 6) % 7;
  const week1Mon = addDays(jan4, -dow);
  return addDays(week1Mon, (n - 1) * 7);
}
function weeksInYear(year) {
  // ISO: 52 weeks usually, 53 if Jan 1 is Thursday or (in leap years) Wednesday
  const jan1Dow = new Date(year, 0, 1).getDay();
  const leap = ((year % 4 === 0 && year % 100 !== 0) || year % 400 === 0);
  if (jan1Dow === 4 || (leap && jan1Dow === 3)) return 53;
  return 52;
}

function ord(n){
  const s=['th','st','nd','rd'], v=n%100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}


/* ──────────────────────────── parser ─────────────────────────────
 *
 * Two passes:
 *
 *   tokenize(input)  →  Token[]
 *   parse(tokens)    →  AST
 *   eval(ast)        →  { kind, start, end }
 *
 * Patterns are matched on token sequences, not regex on the raw string.
 * Adding a new alias means adding one row to a vocabulary map; adding a
 * new construct means one new rule + one new evaluator.
 *
 * ────────────────────────────────────────────────────────────────── */

const DIRECTIONS = {
  this:     { sign:  0, kind: 'this' },
  current:  { sign:  0, kind: 'this' },
  all:      { sign:  0, kind: 'this' },
  whole:    { sign:  0, kind: 'this' },
  entire:   { sign:  0, kind: 'this' },
  next:     { sign:  1, kind: 'next' },
  nxt:      { sign:  1, kind: 'next' },
  coming:   { sign:  1, kind: 'next' },
  upcoming: { sign:  1, kind: 'next' },
  last:     { sign: -1, kind: 'last' },
  past:     { sign: -1, kind: 'last' },
  previous: { sign: -1, kind: 'last' },
  former:   { sign: -1, kind: 'last' },
};

const UNITS = {
  d:'day', day:'day', days:'day',
  w:'week', wk:'week', wks:'week', week:'week', weeks:'week',
  mo:'month', mos:'month', month:'month', months:'month',
  q:'quarter', qtr:'quarter', qtrs:'quarter', quarter:'quarter', quarters:'quarter',
  h:'half', half:'half', halves:'half',
  y:'year', yr:'year', yrs:'year', year:'year', years:'year',
  decade:'decade', decades:'decade', decennium:'decade', decennia:'decade',
  century:'century', centuries:'century',
  millennium:'millennium', millennia:'millennium', millenium:'millennium', milleniums:'millennium', millenniums:'millennium',
};

const WEEKDAY_IDX = {
  sun:0, sunday:0,
  mon:1, monday:1,
  tue:2, tues:2, tuesday:2,
  wed:3, weds:3, wednesday:3,
  thu:4, thur:4, thurs:4, thursday:4,
  fri:5, friday:5,
  sat:6, saturday:6,
};

const MONTH_IDX = {
  jan:0, january:0,
  feb:1, february:1,
  mar:2, march:2,
  apr:3, april:3,
  may:4,
  jun:5, june:5,
  jul:6, july:6,
  aug:7, august:7,
  sep:8, sept:8, september:8,
  oct:9, october:9,
  nov:10, november:10,
  dec:11, december:11,
};

const ORDINALS = {
  first:1,  '1st':1, one:1,
  second:2, '2nd':2, two:2,
  third:3,  '3rd':3, three:3,
  fourth:4, '4th':4, four:4,
  fifth:5,  '5th':5, five:5,
  sixth:6, '6th':6, seventh:7, '7th':7,
  eighth:8, '8th':8, ninth:9, '9th':9, tenth:10, '10th':10,
  last:-1, final:-1,
};

const HOLIDAYS = {
  // Fixed
  christmas:           { type:'fixed', month:11, day:25 },
  xmas:                { type:'fixed', month:11, day:25 },
  'christmas day':     { type:'fixed', month:11, day:25 },
  'christmas eve':     { type:'fixed', month:11, day:24 },
  'xmas eve':          { type:'fixed', month:11, day:24 },
  'new year':          { type:'fixed', month: 0, day: 1, future:true },
  'new years':         { type:'fixed', month: 0, day: 1, future:true },
  "new year's":        { type:'fixed', month: 0, day: 1, future:true },
  "new year's day":    { type:'fixed', month: 0, day: 1, future:true },
  'new years day':     { type:'fixed', month: 0, day: 1, future:true },
  nye:                 { type:'fixed', month:11, day:31 },
  "new year's eve":    { type:'fixed', month:11, day:31 },
  'new years eve':     { type:'fixed', month:11, day:31 },
  halloween:           { type:'fixed', month: 9, day:31 },
  "hallowe'en":        { type:'fixed', month: 9, day:31 },
  valentines:          { type:'fixed', month: 1, day:14 },
  "valentine's":       { type:'fixed', month: 1, day:14 },
  "valentine's day":   { type:'fixed', month: 1, day:14 },
  'valentines day':    { type:'fixed', month: 1, day:14 },
  'april fools':       { type:'fixed', month: 3, day: 1 },
  "april fool's":      { type:'fixed', month: 3, day: 1 },
  "april fools' day":  { type:'fixed', month: 3, day: 1 },
  'independence day':  { type:'fixed', month: 6, day: 4 },
  'july 4th':          { type:'fixed', month: 6, day: 4 },
  'fourth of july':    { type:'fixed', month: 6, day: 4 },
  '4th of july':       { type:'fixed', month: 6, day: 4 },
  juneteenth:          { type:'fixed', month: 5, day:19 },
  'veterans day':      { type:'fixed', month:10, day:11 },
  "veteran's day":     { type:'fixed', month:10, day:11 },
  'pi day':            { type:'fixed', month: 2, day:14 },
  // Nth-weekday
  thanksgiving:        { type:'nth', month:10, weekday:4, nth:4 },
  'thanksgiving day':  { type:'nth', month:10, weekday:4, nth:4 },
  "mother's day":      { type:'nth', month: 4, weekday:0, nth:2 },
  'mothers day':       { type:'nth', month: 4, weekday:0, nth:2 },
  "father's day":      { type:'nth', month: 5, weekday:0, nth:3 },
  'fathers day':       { type:'nth', month: 5, weekday:0, nth:3 },
  'labor day':         { type:'nth', month: 8, weekday:1, nth:1 },
  'labour day':        { type:'nth', month: 8, weekday:1, nth:1 },
  'memorial day':      { type:'nth', month: 4, weekday:1, nth:-1 },
  'mlk day':           { type:'nth', month: 0, weekday:1, nth:3 },
  'martin luther king day': { type:'nth', month: 0, weekday:1, nth:3 },
  'presidents day':    { type:'nth', month: 1, weekday:1, nth:3 },
  "president's day":   { type:'nth', month: 1, weekday:1, nth:3 },
  'columbus day':      { type:'nth', month: 9, weekday:1, nth:2 },
  'indigenous peoples day':    { type:'nth', month: 9, weekday:1, nth:2 },
  "indigenous peoples' day":   { type:'nth', month: 9, weekday:1, nth:2 },
  // Easter-relative
  easter:              { type:'easter', offset: 0 },
  'easter sunday':     { type:'easter', offset: 0 },
  'good friday':       { type:'easter', offset:-2 },
  // Solstice (defaults to summer; user can write "winter solstice" if needed later)
  solstice:            { type:'solstice' },
};

const CONNECTIVES = new Set(['to','through','thru','until','til','till']);

/* ──────────────────────────── tokenize ───────────────────────── */

function normalizeInput(s) {
  return s.toLowerCase().replace(/[,!?]+/g,' ').replace(/\s+/g,' ').trim();
}

function tokenize(input) {
  let s = normalizeInput(input);

  // a handful of phrases that resolve to literals
  s = s.replace(/\bthe day after tomorrow\b/g, '__dat__');
  s = s.replace(/\bday after tomorrow\b/g,     '__dat__');
  s = s.replace(/\bthe day before yesterday\b/g, '__dby__');
  s = s.replace(/\bday before yesterday\b/g,     '__dby__');
  s = s.replace(/\bprior to\b/g, 'before');
  s = s.replace(/\bin the future\b/g, '');
  s = s.replace(/\b(?:from|since)\s+(now|today)\b(?!\s+(?:to|through|thru|until|til|till))/g, '__forward__');
  s = s.replace(/\bfrom\s+(now|today)\b/g, '$1');  // remaining "from now" before connectives → "now"
  s = s.trim();

  if (!s) return [];
  const words = s.split(' ');
  const tokens = [];
  let i = 0;
  while (i < words.length) {
    let matched = false;
    // Try multi-word phrases (longest first)
    for (let n = Math.min(4, words.length - i); n >= 2; n--) {
      const phrase = words.slice(i, i+n).join(' ');
      if (phrase in HOLIDAYS) {
        tokens.push({ type:'HOLIDAY', value: phrase, raw: phrase });
        i += n; matched = true; break;
      }
    }
    if (matched) continue;
    const tk = classifyWord(words[i]);
    if (Array.isArray(tk)) tokens.push(...tk);
    else if (tk) tokens.push(tk);
    i++;
  }
  return tokens;
}

function classifyWord(w) {
  if (!w) return null;
  let m;

  // Literal sentinels from preprocessing
  if (w === '__dat__')      return { type:'LIT', value: 2, raw:'day after tomorrow' };
  if (w === '__dby__')      return { type:'LIT', value:-2, raw:'day before yesterday' };
  if (w === '__forward__')  return { type:'FROMNOW', raw:'from now' };

  // ISO date YYYY-MM-DD
  if (m = w.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/)) {
    const d = new Date(+m[1], +m[2]-1, +m[3]);
    if (d.getMonth() === +m[2]-1 && d.getDate() === +m[3]) {
      return { type:'DATE', value: d, raw: w };
    }
  }
  // Slash date
  if (m = w.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/)) {
    const a = +m[1], b = +m[2];
    const y = m[3] ? (m[3].length === 2 ? 2000 + +m[3] : +m[3]) : TODAY.getFullYear();
    const month = a > 12 ? b - 1 : a - 1;
    const day   = a > 12 ? a     : b;
    const d = new Date(y, month, day);
    if (d.getMonth() === month && d.getDate() === day) return { type:'DATE', value: d, raw: w };
  }
  // Dot date (D.M.Y)
  if (m = w.match(/^(\d{1,2})\.(\d{1,2})(?:\.(\d{2,4}))?$/)) {
    const day = +m[1], month = +m[2] - 1;
    const y = m[3] ? (m[3].length === 2 ? 2000 + +m[3] : +m[3]) : TODAY.getFullYear();
    const d = new Date(y, month, day);
    if (d.getMonth() === month && d.getDate() === day) return { type:'DATE', value: d, raw: w };
  }
  // Quarters / halves
  if (/^q[1-4]$/.test(w)) return { type:'QUARTER', value: parseInt(w[1]) - 1, raw: w };
  if (/^h[12]$/.test(w))  return { type:'HALF',    value: parseInt(w[1]) - 1, raw: w };
  // Decade shorthand: "2020s", "1990s"
  if (m = w.match(/^(\d{4})s$/)) {
    const y = parseInt(m[1]);
    if (y >= 1000 && y <= 2900 && y % 10 === 0) return { type:'DECADE', value: y, raw: w };
  }

  // Signed numbers: "+5", "-7", "+1w", "-2mo" — split into OP + NUMBER (+ optional UNIT)
  // so the parser's postfix-shift rule handles them uniformly whether they appear
  // standalone (+5 alone) or trailing an anchor ("first fri of next month +5").
  if (m = w.match(/^([+-])(\d+)([a-z]+)?$/)) {
    const sign = m[1] === '+' ? 1 : -1;
    const parts = [
      { type:'OP', value: sign, raw: m[1] },
      { type:'NUMBER', value: parseInt(m[2]), raw: m[2] },
    ];
    if (m[3]) {
      const unit = UNITS[m[3]];
      if (!unit) return null;
      parts.push({ type:'UNIT', value: unit, raw: m[3] });
    }
    return parts;
  }
  // Attached number+unit: "5d", "10w", "3mo" — split so existing rules handle it
  if (!/(st|nd|rd|th)$/.test(w) && (m = w.match(/^(\d+)([a-z]+)$/))) {
    const unit = UNITS[m[2]];
    if (unit) return [
      { type:'NUMBER', value: parseInt(m[1]), raw: m[1] },
      { type:'UNIT', value: unit, raw: m[2] },
    ];
  }
  // Ordinal numerals: 1st, 2nd, ...
  if (m = w.match(/^(\d+)(st|nd|rd|th)$/)) {
    return { type:'ORD', value: parseInt(m[1]), raw: w };
  }
  // Bare years
  if (/^\d{4}$/.test(w)) {
    const y = parseInt(w);
    if (y >= 1900 && y <= 2200) return { type:'YEAR', value: y, raw: w };
  }
  // Numbers (including 2-digit year tail)
  if (/^\d+$/.test(w)) {
    return { type:'NUMBER', value: parseInt(w), raw: w };
  }

  // Operators
  if (w === '+' || w === 'plus')  return { type:'OP', value: 1, raw: w };
  if (w === 'minus')              return { type:'OP', value:-1, raw: w };
  // bare '-' (and en/em dash) is ambiguous: shift or range. tag as DASH and let parser decide.
  if (w === '-' || w === '–' || w === '—') return { type:'DASH', raw: w };
  // range arrows
  if (w === '..' || w === '...' || w === '->' || w === '→') return { type:'CONN', raw: w };

  // Boundary words
  if (w === 'mid' || w === 'middle')                  return { type:'BOUND', value:'mid',   raw: w };
  if (w === 'early')                                  return { type:'BOUND', value:'early', raw: w };
  if (w === 'late')                                   return { type:'BOUND', value:'late',  raw: w };
  if (w === 'start' || w === 'beginning')             return { type:'BOUND', value:'start', raw: w };
  if (w === 'end')                                    return { type:'BOUND', value:'end',   raw: w };

  // Compact bound+unit
  if (w === 'eom') return { type:'BOUND_UNIT', bound:'end',   unit:'month', raw: w };
  if (w === 'bom') return { type:'BOUND_UNIT', bound:'start', unit:'month', raw: w };
  if (w === 'eoy') return { type:'BOUND_UNIT', bound:'end',   unit:'year',  raw: w };
  if (w === 'boy') return { type:'BOUND_UNIT', bound:'start', unit:'year',  raw: w };
  if (w === 'eow') return { type:'BOUND_UNIT', bound:'end',   unit:'week',  raw: w };
  if (w === 'bow') return { type:'BOUND_UNIT', bound:'start', unit:'week',  raw: w };

  // Vocabulary
  if (w in DIRECTIONS)   return { type:'DIR',     value: DIRECTIONS[w],   raw: w };
  if (w in UNITS)        return { type:'UNIT',    value: UNITS[w],        raw: w };
  if (w in WEEKDAY_IDX)  return { type:'WEEKDAY', value: WEEKDAY_IDX[w],  raw: w };
  if (w in MONTH_IDX)    return { type:'MONTH',   value: MONTH_IDX[w],    raw: w };
  if (w in ORDINALS)     return { type:'ORD',     value: ORDINALS[w],     raw: w };
  if (w in HOLIDAYS)     return { type:'HOLIDAY', value: w,               raw: w };

  // Literals
  if (['today','tdy','now'].includes(w))                            return { type:'LIT', value: 0, raw: w };
  if (['tomorrow','tmrw','tmr','tmro','tmw'].includes(w))           return { type:'LIT', value: 1, raw: w };
  if (['yesterday','yday','ytd'].includes(w))                       return { type:'LIT', value:-1, raw: w };
  if (w === 'weekend')                                              return { type:'WEEKEND', raw: w };
  if (w === 'weekday')                                              return { type:'WEEKDAY_LIT', raw: w };

  // Connectives
  if (CONNECTIVES.has(w)) return { type:'CONN', raw: w };
  if (w === 'from')       return { type:'FROM', raw: w };
  if (w === 'between')    return { type:'BETWEEN', raw: w };
  if (w === 'and')        return { type:'AND', raw: w };
  if (w === 'of')         return { type:'OF', raw: w };
  if (w === 'in')         return { type:'IN', raw: w };

  // Relative prepositions
  if (['ago','before','after','hence','later','ahead'].includes(w)) {
    return { type:'RELPREP', value: w, raw: w };
  }

  return { type:'WORD', raw: w };
}

/* ──────────────────────────── parser ─────────────────────────── */

function parse(input) {
  if (!input || !input.trim()) return null;
  const tokens = tokenize(input);
  if (!tokens.length) return null;
  const ast = parseExpr(tokens);
  if (!ast) return null;
  const result = evalAst(ast);
  if (!result) return null;
  return { ...result, input };
}

// Try Range first; fall through to Term.
function parseExpr(toks) {
  return parseRange(toks) || parseTerm(toks);
}

function parseRange(toks) {
  // "from X to Y", "from X - Y"
  if (toks[0] && toks[0].type === 'FROM') {
    for (let i = 1; i < toks.length - 1; i++) {
      if (toks[i].type === 'CONN' || toks[i].type === 'DASH') {
        const a = parseTerm(toks.slice(1, i));
        const b = parseTerm(toks.slice(i + 1));
        if (a && b) return { type:'Range', a, b };
      }
    }
  }
  // "between X and Y"
  if (toks[0] && toks[0].type === 'BETWEEN') {
    for (let i = 1; i < toks.length - 1; i++) {
      if (toks[i].type === 'AND') {
        const a = parseTerm(toks.slice(1, i));
        const b = parseTerm(toks.slice(i + 1));
        if (a && b) return { type:'Range', a, b };
      }
    }
  }
  // "X to Y", "X through Y", "X – Y"
  for (let i = 1; i < toks.length - 1; i++) {
    if (toks[i].type === 'CONN' || toks[i].type === 'DASH') {
      // "may 12 - 19" — bare number on the right reuses month/year context from the left
      const a = parseTerm(toks.slice(0, i));
      if (!a) continue;
      const right = toks.slice(i + 1);
      let b = parseTerm(right);
      if (!b && right.length === 1 && right[0].type === 'NUMBER' && a.type === 'MonthDay') {
        b = { type:'MonthDay', month: a.month, day: right[0].value, year: a.year };
      }
      if (a && b) return { type:'Range', a, b };
    }
  }
  return null;
}

function parseTerm(toks) {
  if (!toks.length) return null;

  // <anchor> OP|DASH n unit?    — greedy: rightmost OP first so chained shifts compose
  for (let i = toks.length - 1; i >= 1; i--) {
    const t = toks[i];
    if (t.type !== 'OP' && t.type !== 'DASH') continue;
    // Acceptable suffixes: [n], [n, unit], [n, unit, ago]
    const after = toks.slice(i + 1);
    if (!after.length || after[0].type !== 'NUMBER') continue;
    const n = after[0].value;
    let unit = 'day', consumed = 1;
    if (after.length >= 2 && after[1].type === 'UNIT') { unit = after[1].value; consumed = 2; }
    if (consumed !== after.length) continue;
    const sign = (t.type === 'OP') ? t.value : -1;
    const anchor = parseTerm(toks.slice(0, i));
    if (!anchor) continue;
    return { type:'Shift', anchor, sign, n, unit };
  }

  // "n unit (before|after|prior|ago) anchor"   →  shift anchor (or TODAY for ago) by ±n unit
  for (let i = 1; i < toks.length; i++) {
    if (toks[i].type === 'RELPREP' && toks[0].type === 'NUMBER' && toks[1] && toks[1].type === 'UNIT') {
      const n = toks[0].value;
      const unit = toks[1].value;
      const word = toks[i].value;
      const sign = (word === 'ago' || word === 'before' || word === 'prior') ? -1 : 1;
      if (word === 'ago') {
        if (i === 2 && i === toks.length - 1) return { type:'Shift', anchor: { type:'Literal', value: 0 }, sign, n, unit };
        continue;
      }
      if (word === 'hence' || word === 'later' || word === 'ahead') {
        if (i === 2 && i === toks.length - 1) return { type:'Shift', anchor: { type:'Literal', value: 0 }, sign, n, unit };
        continue;
      }
      // before / after: anchor follows
      if (i === 2) {
        const anchor = parseTerm(toks.slice(3));
        if (anchor) return { type:'Shift', anchor, sign, n, unit };
      }
    }
  }

  // "in N unit" or "N unit from now/today" (after FROMNOW collapse)
  if (toks.length >= 3 && toks[0].type === 'IN' && toks[1].type === 'NUMBER' && toks[2].type === 'UNIT') {
    if (toks.length === 3 || (toks.length === 4 && toks[3].type === 'FROMNOW')) {
      return { type:'Shift', anchor:{ type:'Literal', value: 0 }, sign: 1, n: toks[1].value, unit: toks[2].value };
    }
  }
  if (toks.length >= 3 && toks[0].type === 'NUMBER' && toks[1].type === 'UNIT' && toks[2].type === 'FROMNOW' && toks.length === 3) {
    return { type:'Shift', anchor:{ type:'Literal', value: 0 }, sign: 1, n: toks[0].value, unit: toks[1].value };
  }

  // "N weekdays from now / ago"
  if (toks.length >= 3 && toks[0].type === 'NUMBER' && toks[1].type === 'WEEKDAY') {
    if (toks.length === 3 && toks[2].type === 'FROMNOW') {
      return { type:'NthWeekdayFromNow', n: toks[0].value, wd: toks[1].value, dir: 1 };
    }
    if (toks.length === 3 && toks[2].type === 'RELPREP' && toks[2].value === 'ago') {
      return { type:'NthWeekdayFromNow', n: toks[0].value, wd: toks[1].value, dir: -1 };
    }
  }

  return parseAtom(toks);
}

function parseAtom(toks) {
  if (!toks.length) return null;
  const t0 = toks[0];

  // Single tokens
  if (toks.length === 1) {
    if (t0.type === 'LIT')      return { type:'Literal', value: t0.value };
    if (t0.type === 'DATE')     return { type:'DateLit', value: t0.value };
    if (t0.type === 'HOLIDAY')  return { type:'Holiday', name: t0.value, year: null };
    if (t0.type === 'WEEKDAY')  return { type:'Weekday', dir:'next-or-today', wd: t0.value };
    if (t0.type === 'WEEKEND')  return { type:'WeekendRange', dir:'this' };
    if (t0.type === 'WEEKDAY_LIT') return { type:'NextWeekday' };  // next non-weekend
    if (t0.type === 'YEAR')     return { type:'YearRange', year: t0.value };
    if (t0.type === 'MONTH')    return { type:'MonthRange', month: t0.value, year: null };
    if (t0.type === 'QUARTER')  return { type:'QuarterRange', q: t0.value, year: TODAY.getFullYear() };
    if (t0.type === 'HALF')     return { type:'HalfRange', h: t0.value, year: TODAY.getFullYear() };
    if (t0.type === 'DECADE')   return { type:'DecadeRange', decade: t0.value };
    if (t0.type === 'BOUND_UNIT') return { type:'BoundOf', bound: t0.bound, ref: { type:'Period', dir:'this', unit: t0.unit } };
  }

  // Two tokens
  if (toks.length === 2) {
    const [a, b] = toks;
    // Standalone signed offset: "+45", "-7"  →  today ± n days
    if (a.type === 'OP' && b.type === 'NUMBER') {
      return { type:'Shift', anchor:{ type:'Literal', value: 0 }, sign: a.value, n: b.value, unit:'day' };
    }
    // "week 20", "month 3", "quarter 2", "day 100"  →  Nth slot of current year
    // ("century 21", "millennium 3" mean the era directly, not Nth-of-year)
    if (a.type === 'UNIT' && b.type === 'NUMBER') {
      if (a.value === 'century')    return { type:'CenturyRange', n: b.value };
      if (a.value === 'millennium') return { type:'MillenniumRange', n: b.value };
      return { type:'NthIn', unit: a.value, n: b.value, container: { type:'YearRange', year: TODAY.getFullYear() } };
    }
    // "1st month", "3rd week", "21st century", "3rd millennium"
    if (a.type === 'ORD' && b.type === 'UNIT') {
      if (b.value === 'century')    return { type:'CenturyRange', n: a.value };
      if (b.value === 'millennium') return { type:'MillenniumRange', n: a.value };
      return { type:'NthIn', unit: b.value, n: a.value, container: { type:'YearRange', year: TODAY.getFullYear() } };
    }
    if (a.type === 'DIR' && b.type === 'UNIT')      return { type:'Period', dir: a.value.kind, unit: b.value };
    if (a.type === 'DIR' && b.type === 'WEEKEND')   return { type:'WeekendRange', dir: a.value.kind };
    if (a.type === 'DIR' && b.type === 'WEEKDAY')   return { type:'Weekday', dir: a.value.kind, wd: b.value };
    if (a.type === 'DIR' && b.type === 'MONTH')     return { type:'MonthRange', month: b.value, year: shiftedYearForMonth(b.value, a.value) };
    if (a.type === 'HOLIDAY' && b.type === 'YEAR')  return { type:'Holiday', name: a.value, year: b.value };
    if (a.type === 'MONTH' && b.type === 'NUMBER')  return validDay(a.value, b.value) ? { type:'MonthDay', month: a.value, day: b.value, year: TODAY.getFullYear() } : null;
    if (a.type === 'MONTH' && b.type === 'ORD')     return validDay(a.value, b.value) ? { type:'MonthDay', month: a.value, day: b.value, year: TODAY.getFullYear() } : null;
    if (a.type === 'NUMBER' && b.type === 'MONTH')  return validDay(b.value, a.value) ? { type:'MonthDay', month: b.value, day: a.value, year: TODAY.getFullYear() } : null;
    if (a.type === 'ORD' && b.type === 'MONTH')     return validDay(b.value, a.value) ? { type:'MonthDay', month: b.value, day: a.value, year: TODAY.getFullYear() } : null;
    if (a.type === 'MONTH' && b.type === 'YEAR')    return { type:'MonthRange', month: a.value, year: b.value };
    if (a.type === 'QUARTER' && b.type === 'YEAR')  return { type:'QuarterRange', q: a.value, year: b.value };
    if (a.type === 'HALF' && b.type === 'YEAR')     return { type:'HalfRange', h: a.value, year: b.value };
    if (a.type === 'BOUND' && b.type === 'MONTH')   return { type:'BoundOfMonth', bound: a.value, month: b.value, year: TODAY.getFullYear() };
    if (a.type === 'WEEKEND' && b.type === 'RELPREP' && b.value === 'after') {
      return null;  // "weekend after" alone is incomplete
    }
  }

  // Three tokens
  if (toks.length === 3) {
    const [a, b, c] = toks;
    // Standalone signed offset with unit: "+5 days", "-2 weeks"
    if (a.type === 'OP' && b.type === 'NUMBER' && c.type === 'UNIT') {
      return { type:'Shift', anchor:{ type:'Literal', value: 0 }, sign: a.value, n: b.value, unit: c.value };
    }
    if (a.type === 'DIR' && b.type === 'NUMBER' && c.type === 'UNIT') {
      return { type:'Window', dir: a.value.kind, n: b.value, unit: c.value };
    }
    // "week 20 2027", "month 3 2027"
    if (a.type === 'UNIT' && b.type === 'NUMBER' && c.type === 'YEAR') {
      return { type:'NthInYear', unit: a.value, n: b.value, year: c.value };
    }
    // "1st week of 2027", "3rd month 2027"
    if (a.type === 'ORD' && b.type === 'UNIT' && c.type === 'YEAR') {
      return { type:'NthInYear', unit: b.value, n: a.value, year: c.value };
    }
    if (a.type === 'MONTH' && b.type === 'NUMBER' && c.type === 'YEAR' && validDay(a.value, b.value)) {
      return { type:'MonthDay', month: a.value, day: b.value, year: c.value };
    }
    if (a.type === 'MONTH' && b.type === 'ORD' && c.type === 'YEAR' && validDay(a.value, b.value)) {
      return { type:'MonthDay', month: a.value, day: b.value, year: c.value };
    }
    if (a.type === 'NUMBER' && b.type === 'MONTH' && c.type === 'YEAR' && validDay(b.value, a.value)) {
      return { type:'MonthDay', month: b.value, day: a.value, year: c.value };
    }
    if (a.type === 'ORD' && b.type === 'MONTH' && c.type === 'YEAR' && validDay(b.value, a.value)) {
      return { type:'MonthDay', month: b.value, day: a.value, year: c.value };
    }
    if (a.type === 'NUMBER' && b.type === 'OF' && c.type === 'MONTH' && validDay(c.value, a.value)) {
      return { type:'MonthDay', month: c.value, day: a.value, year: TODAY.getFullYear() };
    }
    // "weekend after next"
    if (a.type === 'WEEKEND' && b.type === 'RELPREP' && b.value === 'after' && c.type === 'DIR' && c.value.kind === 'next') {
      return { type:'WeekendRange', dir:'after-next' };
    }
    // "start/end of <ref>" with 2-token ref handled below at length 4+
    // "early may 2027"
    if (a.type === 'BOUND' && b.type === 'MONTH' && c.type === 'YEAR') {
      return { type:'BoundOfMonth', bound: a.value, month: b.value, year: c.value };
    }
    // "next 3 weekdays from now" — skip
    // "DIR DIR weekend after next"  handled  4-token below
    // "mid-may" comes as single token "mid-may" — handle in tokenizer? Skip for now.
  }

  // Four+: "first mon of march", "last fri of october 2027", "start of next month"
  if (toks.length === 4) {
    const [a, b, c, d] = toks;
    if (isOrdinalLike(a) && b.type === 'WEEKDAY' && c.type === 'OF' && d.type === 'MONTH') {
      return { type:'NthWeekday', nth: ordValue(a), wd: b.value, monthRef: { type:'MonthRange', month: d.value, year: TODAY.getFullYear() } };
    }
    // "1st week of sept", "3rd day of march"
    if (isOrdinalLike(a) && b.type === 'UNIT' && c.type === 'OF' && d.type === 'MONTH') {
      return { type:'NthIn', unit: b.value, n: ordValue(a), container: { type:'MonthRange', month: d.value, year: TODAY.getFullYear() } };
    }
    // "1st week of 2027", "5th month of next year", "3rd day of next week"
    if (isOrdinalLike(a) && b.type === 'UNIT' && c.type === 'OF') {
      const cont = parseAtom([d]);
      if (cont) return { type:'NthIn', unit: b.value, n: ordValue(a), container: cont };
    }
    // "1st week of month" / "3rd day of week" — "this Y"
    if (isOrdinalLike(a) && b.type === 'UNIT' && c.type === 'OF' && d.type === 'UNIT') {
      return { type:'NthIn', unit: b.value, n: ordValue(a), container: { type:'Period', dir:'this', unit: d.value } };
    }
    if (a.type === 'BOUND' && b.type === 'OF' && c.type === 'DIR' && d.type === 'UNIT') {
      return { type:'BoundOf', bound: a.value, ref: { type:'Period', dir: c.value.kind, unit: d.value } };
    }
    if (a.type === 'BOUND' && b.type === 'OF' && c.type === 'UNIT' && d == null) {
      return { type:'BoundOf', bound: a.value, ref: { type:'Period', dir:'this', unit: c.value } };
    }
  }

  // "start/end of <ref>" — generic: rest of tokens is ref
  if (toks.length >= 3 && toks[0].type === 'BOUND' && toks[1].type === 'OF') {
    const ref = parseAtom(toks.slice(2));
    if (ref) return { type:'BoundOf', bound: toks[0].value, ref };
  }

  // "first/last mon of <monthRef>" with year ("last" can tokenize as DIR — accept both)
  if (toks.length >= 5 && isOrdinalLike(toks[0]) && toks[1].type === 'WEEKDAY' && toks[2].type === 'OF') {
    const ref = parseAtom(toks.slice(3));
    if (ref && (ref.type === 'MonthRange' || ref.type === 'Period')) {
      return { type:'NthWeekday', nth: ordValue(toks[0]), wd: toks[1].value, monthRef: ref };
    }
  }
  // "Nth UNIT of <container>" — container can be any AST node that evaluates to a range
  if (toks.length >= 5 && isOrdinalLike(toks[0]) && toks[1].type === 'UNIT' && toks[2].type === 'OF') {
    const cont = parseAtom(toks.slice(3));
    if (cont) return { type:'NthIn', unit: toks[1].value, n: ordValue(toks[0]), container: cont };
  }

  // "start of <ref>" with 2 tokens (e.g. "start of week" → bound + unit)
  if (toks.length === 3 && toks[0].type === 'BOUND' && toks[1].type === 'OF' && toks[2].type === 'UNIT') {
    return { type:'BoundOf', bound: toks[0].value, ref: { type:'Period', dir:'this', unit: toks[2].value } };
  }
  if (toks.length === 3 && toks[0].type === 'BOUND' && toks[1].type === 'OF' && toks[2].type === 'MONTH') {
    return { type:'BoundOfMonth', bound: toks[0].value, month: toks[2].value, year: TODAY.getFullYear() };
  }

  return null;
}

// "last" tokenizes as DIR but can mean ordinal when followed by `WEEKDAY of MONTH`.
function isOrdinalLike(tok) {
  return tok.type === 'ORD' || (tok.type === 'DIR' && tok.value.kind === 'last');
}
function ordValue(tok) {
  return tok.type === 'ORD' ? tok.value : -1;
}

function shiftedYearForMonth(monthIdx, dir) {
  let y = TODAY.getFullYear();
  if (dir.kind === 'next' && monthIdx <= TODAY.getMonth()) y += 1;
  else if (dir.kind === 'last' && monthIdx >= TODAY.getMonth()) y -= 1;
  return y;
}

function validDay(monthIdx, day) {
  if (day < 1 || day > 31) return false;
  const last = new Date(TODAY.getFullYear(), monthIdx + 1, 0).getDate();
  return day <= last;
}

/* ──────────────────────────── evaluator ──────────────────────── */

function evalAst(node) {
  if (!node) return null;
  switch (node.type) {
    case 'Literal':       return single(addDays(TODAY, node.value));
    case 'DateLit':       return single(node.value);
    case 'MonthDay': {
      const d = new Date(node.year, node.month, node.day);
      if (d.getMonth() !== node.month) return null;
      return single(d);
    }
    case 'Holiday': {
      const d = resolveHoliday(node.name, node.year);
      return d ? single(d) : null;
    }
    case 'Weekday':       return single(weekdayDate(node.dir, node.wd));
    case 'NthWeekdayFromNow': {
      let d = new Date(TODAY);
      let step = Math.abs(node.n);
      do { d = addDays(d, node.dir); } while (d.getDay() !== node.wd);
      step -= 1;
      d = addDays(d, node.dir * 7 * step);
      return single(d);
    }
    case 'NextWeekday': {
      let d = addDays(TODAY, 1);
      while (d.getDay() === 0 || d.getDay() === 6) d = addDays(d, 1);
      return single(d);
    }
    case 'NthWeekday': {
      const mr = node.monthRef;
      let y, m;
      if (mr.month != null) { y = mr.year ?? TODAY.getFullYear(); m = mr.month; }
      else if (mr.type === 'Period') {
        const ref = mr.dir === 'next' ? addMonths(TODAY, 1) : mr.dir === 'last' ? addMonths(TODAY, -1) : TODAY;
        y = ref.getFullYear(); m = ref.getMonth();
      } else return null;
      return single(nthWeekdayInMonth(y, m, node.wd, node.nth));
    }
    case 'Shift': {
      const a = evalAst(node.anchor);
      if (!a) return null;
      return single(shiftDate(a.start, node.sign * node.n, node.unit));
    }
    case 'Period':        return periodRange(node.dir, node.unit);
    case 'Window':        return windowRange(node.dir, node.n, node.unit);
    case 'WeekendRange':  return weekendRange(node.dir);
    case 'YearRange':     return range(new Date(node.year, 0, 1), new Date(node.year, 11, 31));
    case 'NthIn': {
      const c = evalAst(node.container);
      if (!c) return null;
      return nthSliceWithin(c.start, c.end, node.unit, node.n);
    }
    case 'DecadeRange': {
      return range(new Date(node.decade, 0, 1), new Date(node.decade + 9, 11, 31));
    }
    case 'CenturyRange': {
      // Common usage: 21st century = 2000-2099 (the years that share the "21st" label)
      return range(new Date((node.n - 1) * 100, 0, 1), new Date(node.n * 100 - 1, 11, 31));
    }
    case 'MillenniumRange': {
      return range(new Date((node.n - 1) * 1000, 0, 1), new Date(node.n * 1000 - 1, 11, 31));
    }
    case 'MonthRange': {
      const y = node.year ?? TODAY.getFullYear();
      return range(new Date(y, node.month, 1), endOfMonth(new Date(y, node.month, 1)));
    }
    case 'QuarterRange': {
      const m0 = node.q * 3;
      return range(new Date(node.year, m0, 1), new Date(node.year, m0 + 3, 0));
    }
    case 'HalfRange': {
      const m0 = node.h * 6;
      return range(new Date(node.year, m0, 1), new Date(node.year, m0 + 6, 0));
    }
    case 'BoundOf': {
      const refDate = evalRefBoundary(node.ref, node.bound);
      return refDate ? single(refDate) : null;
    }
    case 'BoundOfMonth': {
      const day = node.bound === 'mid' ? 15 : (node.bound === 'early' ? 5 : (node.bound === 'late' ? 25 : (node.bound === 'start' ? 1 : null)));
      if (node.bound === 'end') return single(new Date(node.year, node.month + 1, 0));
      if (day == null) return null;
      return single(new Date(node.year, node.month, day));
    }
    case 'Range': {
      const a = evalAst(node.a);
      const b = evalAst(node.b);
      if (!a || !b) return null;
      const s = a.start <= b.start ? a.start : b.end;
      const e = a.start <= b.start ? b.end   : a.start;
      return s <= e ? range(s, e) : range(e, s);
    }
  }
  return null;
}

function single(d) { return d ? { kind:'single', start: d, end: d } : null; }
function range(a, b) { return { kind:'range', start: a, end: b }; }

function shiftDate(d, n, unit) {
  if (unit === 'day')     return addDays(d, n);
  if (unit === 'week')    return addDays(d, n * 7);
  if (unit === 'month')   return addMonths(d, n);
  if (unit === 'quarter') return addMonths(d, n * 3);
  if (unit === 'half')    return addMonths(d, n * 6);
  if (unit === 'year')    return addYears(d, n);
  return d;
}

function weekdayDate(dir, wd) {
  const todayDow = TODAY.getDay();
  let diff = wd - todayDow;
  if (dir === 'this')          { if (diff < 0) diff += 7; }
  else if (dir === 'next')     { if (diff <= 0) diff += 7; }
  else if (dir === 'last')     { if (diff >= 0) diff -= 7; }
  else /* next-or-today */     { if (diff < 0)  diff += 7; }
  return addDays(TODAY, diff);
}

function nthWeekdayInMonth(year, month, wd, nth) {
  if (nth === -1) {
    const last = new Date(year, month + 1, 0);
    const off = (last.getDay() - wd + 7) % 7;
    return addDays(last, -off);
  }
  const first = new Date(year, month, 1);
  const off = (wd - first.getDay() + 7) % 7;
  const day = 1 + off + (nth - 1) * 7;
  const d = new Date(year, month, day);
  if (d.getMonth() !== month) return null;
  return d;
}

// Given a container range, return its Nth `unit` slice (1-indexed; negative counts from the end)
function nthSliceWithin(start, end, unit, n) {
  if (!n) return null;
  if (unit === 'day') {
    const total = diffDays(start, end) + 1;
    const d = n > 0 ? n : total + n + 1;
    if (d < 1 || d > total) return null;
    return single(addDays(start, d - 1));
  }
  if (unit === 'week') {
    const w1 = startOfWeekMon(start);
    const wEnd = startOfWeekMon(end);
    const total = (diffDays(w1, wEnd) / 7) + 1;
    const w = n > 0 ? n : total + n + 1;
    if (w < 1 || w > total) return null;
    const s = addDays(w1, (w - 1) * 7);
    return range(s, addDays(s, 6));
  }
  if (unit === 'month') {
    const total = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth()) + 1;
    const m = n > 0 ? n : total + n + 1;
    if (m < 1 || m > total) return null;
    const target = start.getMonth() + (m - 1);
    const yr = start.getFullYear() + Math.floor(target / 12);
    const mo = ((target % 12) + 12) % 12;
    const s = new Date(yr, mo, 1);
    return range(s, endOfMonth(s));
  }
  if (unit === 'quarter') {
    const sq = Math.floor(start.getMonth() / 3), eq = Math.floor(end.getMonth() / 3);
    const total = (end.getFullYear() - start.getFullYear()) * 4 + (eq - sq) + 1;
    const q = n > 0 ? n : total + n + 1;
    if (q < 1 || q > total) return null;
    const target = sq + (q - 1);
    const yr = start.getFullYear() + Math.floor(target / 4);
    const qi = ((target % 4) + 4) % 4;
    return range(new Date(yr, qi * 3, 1), new Date(yr, qi * 3 + 3, 0));
  }
  if (unit === 'half') {
    const sh = start.getMonth() < 6 ? 0 : 1, eh = end.getMonth() < 6 ? 0 : 1;
    const total = (end.getFullYear() - start.getFullYear()) * 2 + (eh - sh) + 1;
    const h = n > 0 ? n : total + n + 1;
    if (h < 1 || h > total) return null;
    const target = sh + (h - 1);
    const yr = start.getFullYear() + Math.floor(target / 2);
    const hi = ((target % 2) + 2) % 2;
    return range(new Date(yr, hi * 6, 1), new Date(yr, hi * 6 + 6, 0));
  }
  if (unit === 'year') {
    const total = end.getFullYear() - start.getFullYear() + 1;
    const y = n > 0 ? n : total + n + 1;
    if (y < 1 || y > total) return null;
    const yr = start.getFullYear() + y - 1;
    return range(new Date(yr, 0, 1), new Date(yr, 11, 31));
  }
  if (unit === 'decade') {
    const sDec = Math.floor(start.getFullYear() / 10) * 10;
    const eDec = Math.floor(end.getFullYear() / 10) * 10;
    const total = (eDec - sDec) / 10 + 1;
    const d = n > 0 ? n : total + n + 1;
    if (d < 1 || d > total) return null;
    const dec = sDec + (d - 1) * 10;
    return range(new Date(dec, 0, 1), new Date(dec + 9, 11, 31));
  }
  if (unit === 'century') {
    const sC = Math.floor(start.getFullYear() / 100) * 100;
    const eC = Math.floor(end.getFullYear() / 100) * 100;
    const total = (eC - sC) / 100 + 1;
    const c = n > 0 ? n : total + n + 1;
    if (c < 1 || c > total) return null;
    const cent = sC + (c - 1) * 100;
    return range(new Date(cent, 0, 1), new Date(cent + 99, 11, 31));
  }
  return null;
}

function periodRange(dir, unit) {
  const sign = dir === 'next' ? 1 : dir === 'last' ? -1 : 0;
  if (unit === 'day') {
    return single(addDays(TODAY, sign));
  }
  if (unit === 'week') {
    const s = addDays(startOfWeekMon(TODAY), sign * 7);
    return range(s, addDays(s, 6));
  }
  if (unit === 'month') {
    const ref = addMonths(TODAY, sign);
    return range(startOfMonth(ref), endOfMonth(ref));
  }
  if (unit === 'year') {
    const y = TODAY.getFullYear() + sign;
    return range(new Date(y, 0, 1), new Date(y, 11, 31));
  }
  if (unit === 'quarter') {
    const qi = Math.floor(TODAY.getMonth() / 3) + sign;
    const y = TODAY.getFullYear() + Math.floor(qi / 4);
    const q = ((qi % 4) + 4) % 4;
    return range(new Date(y, q * 3, 1), new Date(y, q * 3 + 3, 0));
  }
  if (unit === 'half') {
    const hCurrent = TODAY.getMonth() < 6 ? 0 : 1;
    const hi = hCurrent + sign;
    const y = TODAY.getFullYear() + Math.floor(hi / 2);
    const h = ((hi % 2) + 2) % 2;
    return range(new Date(y, h * 6, 1), new Date(y, h * 6 + 6, 0));
  }
  if (unit === 'decade') {
    const cur = Math.floor(TODAY.getFullYear() / 10) * 10;
    const target = cur + sign * 10;
    return range(new Date(target, 0, 1), new Date(target + 9, 11, 31));
  }
  if (unit === 'century') {
    const cur = Math.floor(TODAY.getFullYear() / 100) * 100;
    const target = cur + sign * 100;
    return range(new Date(target, 0, 1), new Date(target + 99, 11, 31));
  }
  if (unit === 'millennium') {
    const cur = Math.floor(TODAY.getFullYear() / 1000) * 1000;
    const target = cur + sign * 1000;
    return range(new Date(target, 0, 1), new Date(target + 999, 11, 31));
  }
  return null;
}

function windowRange(dir, n, unit) {
  const forward = dir === 'next';
  let s, e;
  if (unit === 'day') {
    if (forward) { s = TODAY; e = addDays(TODAY, n - 1); }
    else         { e = TODAY; s = addDays(TODAY, -(n - 1)); }
  } else if (unit === 'week') {
    if (forward) { s = TODAY; e = addDays(TODAY, n * 7 - 1); }
    else         { e = TODAY; s = addDays(TODAY, -(n * 7 - 1)); }
  } else if (unit === 'month') {
    if (forward) { s = TODAY; e = addDays(addMonths(TODAY, n), -1); }
    else         { e = TODAY; s = addDays(addMonths(TODAY, -n), 1); }
  } else if (unit === 'year') {
    if (forward) { s = TODAY; e = addDays(addYears(TODAY, n), -1); }
    else         { e = TODAY; s = addDays(addYears(TODAY, -n), 1); }
  } else return null;
  return range(s, e);
}

function weekendRange(dir) {
  let sat = TODAY;
  while (sat.getDay() !== 6) sat = addDays(sat, dir === 'last' ? -1 : 1);
  if (dir === 'next' && diffDays(TODAY, sat) < 7) sat = addDays(sat, 7);
  if (dir === 'after-next') sat = addDays(sat, 7);
  if (dir === 'last') {
    while (diffDays(sat, TODAY) < 2) sat = addDays(sat, -7);
  }
  return range(sat, addDays(sat, 1));
}

function evalRefBoundary(refNode, bound) {
  // Resolve the ref to a date interval, then take start/end/mid/early/late
  const r = evalAst(refNode);
  if (!r) return null;
  if (bound === 'start' || bound === 'beginning') return r.start;
  if (bound === 'end')                            return r.end;
  if (bound === 'mid' || bound === 'middle') {
    return new Date(Math.floor((r.start.getTime() + r.end.getTime()) / 2));
  }
  if (bound === 'early') {
    return addDays(r.start, Math.floor(diffDays(r.start, r.end) * 0.1));
  }
  if (bound === 'late') {
    return addDays(r.end, -Math.floor(diffDays(r.start, r.end) * 0.1));
  }
  return null;
}

function resolveHoliday(name, year) {
  const h = HOLIDAYS[name];
  if (!h) return null;
  const y = year ?? TODAY.getFullYear();
  let d;
  if (h.type === 'fixed') d = new Date(y, h.month, h.day);
  else if (h.type === 'nth') d = nthWeekdayInMonth(y, h.month, h.weekday, h.nth);
  else if (h.type === 'easter') d = addDays(easterDate(y), h.offset);
  else if (h.type === 'solstice') {
    // Default to next solstice (summer or winter) from today
    const summer = new Date(y, 5, 21);
    const winter = new Date(y, 11, 21);
    if (TODAY < summer) return summer;
    if (TODAY < winter) return winter;
    return new Date(y + 1, 5, 21);
  }
  if (!d) return null;
  // Auto-roll to next year if user didn't specify a year and the holiday has passed
  if (year == null && d < TODAY) {
    if (h.type === 'fixed') d = new Date(y + 1, h.month, h.day);
    else if (h.type === 'nth') d = nthWeekdayInMonth(y + 1, h.month, h.weekday, h.nth);
    else if (h.type === 'easter') d = addDays(easterDate(y + 1), h.offset);
  }
  return d;
}

function easterDate(y) {
  const a = y % 19;
  const b = Math.floor(y / 100);
  const c = y % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const mo = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * mo + 114) / 31);
  const day = ((h + l - 7 * mo + 114) % 31) + 1;
  return new Date(y, month - 1, day);
}

/* ────────────────── autocomplete & spell correction ───────────── */

const VOCAB = (() => {
  const w = new Set([
    // time literals
    'today','tomorrow','yesterday','now','tdy','tmrw','tmr','tmro','tmw','yday','ytd',
    // weekdays
    'monday','tuesday','wednesday','thursday','friday','saturday','sunday',
    'mon','tue','tues','wed','weds','thu','thur','thurs','fri','sat','sun',
    // months
    'january','february','march','april','may','june','july','august','september','october','november','december',
    'jan','feb','mar','apr','jun','jul','aug','sep','sept','oct','nov','dec',
    // units
    'day','days','week','weeks','wk','wks','month','months','year','years','quarter','weekend',
    // directions / connectives
    'this','all','next','last','past','coming',
    'from','between','to','through','thru','until','til','till','before','after','prior','ago','hence','later','ahead','plus','minus','in','of','and',
    // holidays
    'christmas','xmas','easter','halloween','thanksgiving','valentines','valentine',"valentine's",
    'juneteenth','nye','solstice','independence','july','fourth',
    "mother's","father's",'memorial','labor','labour','veterans','presidents','mlk','pi',
    // special
    'weekday','first','second','third','fourth','fifth','final',
    'start','end','beginning','mid','early','late',
    'eom','bom','eoy','boy','eow','bow',
    'q1','q2','q3','q4','h1','h2',
  ]);
  return Array.from(w);
})();

// Hand-picked priority for tie-breaking common-prefix matches.
const COMMON_RANK = [
  'today','tomorrow','yesterday','tmrw','yday',
  'next','last','this','from','to','in','before','after','ago',
  'monday','tuesday','wednesday','thursday','friday','saturday','sunday',
  'week','month','year','weekend',
  'christmas','thanksgiving','easter','halloween','valentines',
  'january','february','march','april','may','june','july','august','september','october','november','december',
];
const COMMON_INDEX = Object.fromEntries(COMMON_RANK.map((w,i) => [w,i]));

function suggest(input) {
  if (!input) return '';
  const i = input.lastIndexOf(' ');
  const prefix = input.slice(i + 1).toLowerCase();
  if (prefix.length < 2) return '';
  if (!/^[a-z']+$/.test(prefix)) return '';
  if (VOCAB.includes(prefix)) return '';
  const cands = VOCAB.filter(w => w.length > prefix.length && w.startsWith(prefix));
  if (!cands.length) return '';
  cands.sort((a, b) => {
    const ra = COMMON_INDEX[a] ?? 999;
    const rb = COMMON_INDEX[b] ?? 999;
    if (ra !== rb) return ra - rb;
    return a.length - b.length;
  });
  return cands[0].slice(prefix.length);
}

function updateGhost() {
  const q = $('q');
  const shadow = q.parentElement.querySelector('.shadow');
  const typed = shadow.querySelector('.typed');
  const ghost = shadow.querySelector('.ghost');
  const v = q.value;
  typed.textContent = v;
  const atEnd = q.selectionStart === v.length && q.selectionEnd === v.length;
  ghost.textContent = atEnd ? suggest(v) : '';
  state.suggestion = ghost.textContent;
}

function acceptGhost() {
  if (!state.suggestion) return false;
  const q = $('q');
  q.value += state.suggestion;
  state.suggestion = '';
  runParse();
  q.setSelectionRange(q.value.length, q.value.length);
  return true;
}

/* Levenshtein with early-exit cap */
function lev(a, b, cap) {
  if (a === b) return 0;
  if (Math.abs(a.length - b.length) > cap) return cap + 1;
  const n = a.length, m = b.length;
  if (!n) return m;
  if (!m) return n;
  let prev = new Array(m + 1);
  let curr = new Array(m + 1);
  for (let j = 0; j <= m; j++) prev[j] = j;
  for (let i = 1; i <= n; i++) {
    curr[0] = i;
    let rowMin = curr[0];
    for (let j = 1; j <= m; j++) {
      const c = a[i-1] === b[j-1] ? 0 : 1;
      curr[j] = Math.min(prev[j] + 1, curr[j-1] + 1, prev[j-1] + c);
      if (curr[j] < rowMin) rowMin = curr[j];
    }
    if (rowMin > cap) return cap + 1;
    [prev, curr] = [curr, prev];
  }
  return prev[m];
}

function correctToken(tok) {
  if (tok.length < 3) return null;
  if (!/^[a-z']+$/.test(tok)) return null;
  if (VOCAB.includes(tok)) return null;
  const cap = tok.length <= 4 ? 1 : (tok.length <= 7 ? 2 : 3);
  let best = null, bestDist = cap + 1, runnerUp = cap + 1;
  for (const w of VOCAB) {
    if (Math.abs(w.length - tok.length) > cap) continue;
    const d = lev(tok, w, cap);
    if (d < bestDist) { runnerUp = bestDist; bestDist = d; best = w; }
    else if (d < runnerUp) { runnerUp = d; }
  }
  if (bestDist > cap) return null;
  // Require the runner-up to be at least 1 step worse — avoids ambiguous flips
  if (runnerUp - bestDist < 1) return null;
  return best;
}

function trySpellCorrect(input) {
  const tokens = input.toLowerCase().split(/\s+/);
  let changed = false;
  const fixed = tokens.map(t => {
    const c = correctToken(t);
    if (c && c !== t) { changed = true; return c; }
    return t;
  });
  if (!changed) return null;
  const candidate = fixed.join(' ');
  if (parse(candidate)) return candidate;
  return null;
}

function acceptCorrection() {
  if (!state.correction) return;
  $('q').value = state.correction;
  state.correction = null;
  runParse();
  $('q').focus();
}

/* ───────────────────────────── rendering ───────────────────────── */

const state = {
  parsed: null,
  view: new Date(TODAY.getFullYear(), TODAY.getMonth(), 1),
};

const $ = id => document.getElementById(id);

const FMT_LONG = new Intl.DateTimeFormat('en-US', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
const FMT_FULL_DOW = new Intl.DateTimeFormat('en-US', { weekday: 'long' });
const FMT_MONTH = new Intl.DateTimeFormat('en-US', { month: 'long' });

function renderResult() {
  const r = state.parsed;
  const result = $('result');
  result.innerHTML = '';

  const text = $('q').value;
  if (!text.trim()) {
    const today = TODAY;
    result.innerHTML = `
      <span class="badge warn">empty</span>
      <span class="when"><span class="dim">try anything — </span><em>today</em>, <em>yday to tmrw</em>, <em>first mon of march</em></span>
    `;
    $('isoLine').textContent = '—';
    return;
  }
  if (!r) {
    if (state.correction) {
      result.innerHTML = `
        <span class="badge err">no idea</span>
        <span class="when"><span class="dim">did you mean</span> <button class="hint-btn" id="acceptHint">${state.correction}</button><span class="dim">?</span></span>
        <span class="meta">enter ↵</span>
      `;
      const btn = document.getElementById('acceptHint');
      if (btn) btn.addEventListener('click', acceptCorrection);
    } else {
      result.innerHTML = `
        <span class="badge err">no idea</span>
        <span class="when"><span class="dim">couldn't make sense of that — keep typing</span></span>
      `;
    }
    $('isoLine').textContent = '—';
    return;
  }

  if (r.kind === 'single' || sameDay(r.start, r.end)) {
    const d = r.start;
    const human = FMT_LONG.format(d);
    const dist = relPhrase(d);
    result.innerHTML = `
      <span class="badge">${FMT_FULL_DOW.format(d).slice(0,3).toUpperCase()}</span>
      <span class="when">${formatLong(d)}</span>
      <span class="meta">${dist}</span>
    `;
    $('isoLine').textContent = fmtISO(d);
  } else {
    const a = r.start, b = r.end;
    const days = diffDays(a,b) + 1;
    result.innerHTML = `
      <span class="badge">RANGE</span>
      <span class="when">${formatLong(a)} <span class="dim">→</span> ${formatLong(b)}</span>
      <span class="meta">${days} day${days===1?'':'s'}</span>
    `;
    $('isoLine').textContent = `${fmtISO(a)} → ${fmtISO(b)}`;
  }
}

function formatLong(d) {
  const day = d.getDate();
  const monthName = FMT_MONTH.format(d);
  const yr = d.getFullYear();
  const yrTag = yr === TODAY.getFullYear() ? '' : ` <span class="dim">${yr}</span>`;
  return `<em>${day}</em> ${monthName}${yrTag}`;
}

function relPhrase(d) {
  const days = diffDays(TODAY, d);
  if (days === 0) return 'today';
  if (days === 1) return 'tomorrow · +1d';
  if (days === -1) return 'yesterday · −1d';
  const abs = Math.abs(days);
  const ago = days < 0;
  if (abs < 60) {
    return ago ? `${abs} days ago` : `in ${abs} days`;
  }
  if (abs < 365) {
    const wks = Math.round(abs/7);
    return ago ? `${wks} weeks ago` : `in ${wks} weeks`;
  }
  const mos = Math.round(abs/30);
  return ago ? `${mos} months ago` : `in ${mos} months`;
}

function renderCalendar() {
  const strip = $('strip');
  strip.innerHTML = '<div class="scroll-cue top">↑ earlier</div><div class="scroll-cue bot">later ↓</div>';
  strip.className = 'cal-strip';

  const r = state.parsed;

  if (!r) {
    strip.appendChild(renderMonthPanel(TODAY.getFullYear(), TODAY.getMonth()));
    return;
  }

  const startKey = r.start.getFullYear()*12 + r.start.getMonth();
  const endKey   = r.end.getFullYear()*12 + r.end.getMonth();
  const diff     = endKey - startKey;
  const isRange  = r.kind === 'range' && !sameDay(r.start, r.end);

  if (!isRange || diff === 0) {
    strip.appendChild(renderMonthPanel(r.start.getFullYear(), r.start.getMonth(),
      isRange ? 'both' : null));
    return;
  }

  if (diff === 1) {
    strip.classList.add('panels-2');
    strip.appendChild(renderMonthPanel(r.start.getFullYear(), r.start.getMonth(), 'start'));
    strip.appendChild(renderMonthPanel(r.end.getFullYear(), r.end.getMonth(), 'end'));
    return;
  }

  // diff >= 2 — gap in the middle
  strip.classList.add('panels-gap');
  strip.appendChild(renderMonthPanel(r.start.getFullYear(), r.start.getMonth(), 'start'));
  strip.appendChild(renderGap(diff - 1));
  strip.appendChild(renderMonthPanel(r.end.getFullYear(), r.end.getMonth(), 'end'));
}

function renderGap(months) {
  const el = document.createElement('div');
  el.className = 'gap';
  el.innerHTML = `
    <div class="dots">· · ·</div>
    <div class="n">${months}</div>
    <div class="lbl">month${months===1?'':'s'} between</div>
  `;
  return el;
}

function renderMonthPanel(year, month, role) {
  const panel = document.createElement('div');
  panel.className = 'panel';

  const head = document.createElement('div');
  head.className = 'panel-head';
  const monthName = FMT_MONTH.format(new Date(year, month, 1));
  const yrTag = `<span class="yr">${year}</span>`;
  let roleTag = '';
  if (role === 'start') roleTag = '<span class="role start">Start ↓</span>';
  else if (role === 'end') roleTag = '<span class="role end">↑ End</span>';
  head.innerHTML = `<span class="title">${monthName} ${yrTag}</span>${roleTag}`;
  panel.appendChild(head);

  const dow = document.createElement('div');
  dow.className = 'dow';
  dow.innerHTML = '<span class="w-head">wk</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>';
  panel.appendChild(dow);

  const grid = document.createElement('div');
  grid.className = 'grid';

  const first = new Date(year, month, 1);
  const startOffset = (first.getDay() + 6) % 7;
  const start = addDays(first, -startOffset);

  const r = state.parsed;
  const rs = r ? startOfDay(r.start) : null;
  const re = r ? startOfDay(r.end) : null;
  const isRange = r && r.kind === 'range' && !sameDay(r.start, r.end);

  const todayWeek = isoWeek(TODAY);
  for (let i = 0; i < 42; i++) {
    const d = addDays(start, i);
    if (i % 7 === 0) {
      const wn = document.createElement('div');
      const wk = isoWeek(d);
      wn.className = 'week-num' + (wk === todayWeek && d.getFullYear() === TODAY.getFullYear() ? ' current' : '');
      wn.textContent = wk;
      grid.appendChild(wn);
    }
    const outside = d.getMonth() !== month;
    const isToday = sameDay(d, TODAY);
    let cls = 'cell';
    if (outside) cls += ' outside';
    if (isToday) cls += ' today';

    if (rs && re) {
      const dt = startOfDay(d).getTime();
      if (dt >= rs.getTime() && dt <= re.getTime()) {
        if (isRange) {
          if (sameDay(d, rs)) cls += ' range-start';
          if (sameDay(d, re)) cls += ' range-end';
          if (!sameDay(d, rs) && !sameDay(d, re)) cls += ' in-range';
        } else {
          cls += ' selected';
        }
      }
    }

    const btn = document.createElement('button');
    btn.className = cls;
    btn.textContent = String(d.getDate());
    btn.dataset.iso = fmtISO(d);
    btn.addEventListener('pointerdown', e => onCellDown(e, d, btn));
    btn.addEventListener('click', () => onCellClick(d));
    grid.appendChild(btn);
  }

  panel.appendChild(grid);
  return panel;
}

/* ───────────────────────────── drag ────────────────────────────── */

const drag = {
  active: false, moved: false, which: null,
  startX: 0, startY: 0,
  scrollDir: 0, scrollTimer: null,
};

function onCellDown(e, d, btn) {
  const isHandle = btn.classList.contains('range-start') || btn.classList.contains('range-end');
  drag.moved = false;
  drag.startX = e.clientX;
  drag.startY = e.clientY;
  if (isHandle) {
    e.preventDefault();
    drag.active = true;
    drag.which = btn.classList.contains('range-start') ? 'start' : 'end';
    document.body.classList.add('dragging');
  } else {
    drag.active = false;
  }
}

function onGlobalMove(e) {
  if (!drag.active) return;
  const dx = e.clientX - drag.startX;
  const dy = e.clientY - drag.startY;
  if (!drag.moved && (dx*dx + dy*dy) > 9) drag.moved = true;
  if (!drag.moved) return;

  const el = document.elementFromPoint(e.clientX, e.clientY);
  const cell = el && el.closest && el.closest('.cell');

  if (cell && cell.dataset.iso) {
    if (cell.classList.contains('outside')) {
      // Outside (neighbouring month) cells are direction signals, not instant jumps.
      // Without this, a single pixel of cursor movement past the last in-month cell
      // would re-render the panel, exposing more outside cells under the cursor,
      // and "rush" through months on every subsequent pixel.
      const cd = new Date(cell.dataset.iso + 'T00:00:00');
      const ref = drag.which === 'start' ? state.parsed.start : state.parsed.end;
      setScrollDir(cd > ref ? 1 : -1);
    } else {
      cancelScroll();
      applyDragTo(new Date(cell.dataset.iso + 'T00:00:00'));
    }
    return;
  }

  // Not over any cell — figure out scroll direction from cursor position
  checkScrollEdge(e);
}

function setScrollDir(dir) {
  if (dir !== drag.scrollDir) {
    cancelScroll();
    drag.scrollDir = dir;
    if (dir !== 0) scrollTick(dir, /*first=*/true);
  }
  const strip = $('strip');
  if (!strip) return;
  if (dir > 0) strip.dataset.scrolling = 'down';
  else if (dir < 0) strip.dataset.scrolling = 'up';
  else delete strip.dataset.scrolling;
}

function checkScrollEdge(e) {
  const strip = $('strip');
  if (!strip) return setScrollDir(0);
  const rect = strip.getBoundingClientRect();
  const EDGE = 56;

  // Outer edges of the strip
  if (e.clientY < rect.top + EDGE) return setScrollDir(-1);
  if (e.clientY > rect.bottom - EDGE) return setScrollDir(1);

  // Crease — cursor inside the gap between panels (or between adjacent panels)
  const gap = strip.querySelector('.gap');
  if (gap) {
    const gr = gap.getBoundingClientRect();
    if (e.clientY >= gr.top - 8 && e.clientY <= gr.bottom + 8) {
      return setScrollDir(drag.which === 'start' ? 1 : -1);
    }
  } else {
    const panels = strip.querySelectorAll('.panel');
    if (panels.length === 2) {
      const aBot = panels[0].getBoundingClientRect().bottom;
      const bTop = panels[1].getBoundingClientRect().top;
      if (e.clientY >= aBot - 10 && e.clientY <= bTop + 10) {
        return setScrollDir(drag.which === 'start' ? 1 : -1);
      }
    }
  }

  setScrollDir(0);
}

function scrollTick(dir, first) {
  if (!drag.active || drag.scrollDir !== dir) return;
  const r = state.parsed;
  if (r && drag.which) {
    const ref = drag.which === 'start' ? r.start : r.end;
    applyDragTo(addMonths(ref, dir));
  }
  drag.scrollTimer = setTimeout(() => scrollTick(dir, false), first ? 220 : 320);
}

function cancelScroll() {
  if (drag.scrollTimer) { clearTimeout(drag.scrollTimer); drag.scrollTimer = null; }
  drag.scrollDir = 0;
  const strip = $('strip');
  if (strip) delete strip.dataset.scrolling;
}

function onGlobalUp() {
  if (!drag.active) return;
  cancelScroll();
  document.body.classList.remove('dragging');
  if (drag.moved && state.parsed) {
    const r = state.parsed;
    $('q').value = fmtRangeForInput(r.start, r.end);
  }
  drag.active = false;
  drag.moved = false;
}

function applyDragTo(newDate) {
  const r = state.parsed;
  if (!r) return;
  let s = r.start, e = r.end;
  if (drag.which === 'start') s = newDate; else e = newDate;
  if (s > e) {
    [s, e] = [e, s];
    drag.which = drag.which === 'start' ? 'end' : 'start';
  }
  state.parsed = { ...r, start: s, end: e, kind: 'range' };
  renderResult();
  renderCalendar();
}

function onCellClick(d) {
  if (drag.moved) { drag.moved = false; return; }
  $('q').value = fmtISO(d);
  runParse();
  $('q').focus();
}

function fmtForInput(d) {
  const mo = MONTHS_SHORT[d.getMonth()];
  const yr = d.getFullYear() === TODAY.getFullYear() ? '' : ' ' + d.getFullYear();
  return `${mo} ${d.getDate()}${yr}`;
}
function fmtRangeForInput(a, b) {
  return `${fmtForInput(a)} to ${fmtForInput(b)}`;
}

function runParse() {
  const v = $('q').value;
  const r = parse(v);
  state.parsed = r;
  state.correction = null;
  if (!r && v.trim()) {
    state.correction = trySpellCorrect(v);
  }
  renderResult();
  renderCalendar();
  updateGhost();

  const row = $('inputRow');
  if (v.trim() && !r) {
    row.classList.remove('err'); void row.offsetWidth; row.classList.add('err');
  } else {
    row.classList.remove('err');
  }
}

/* Wiring */
$('q').addEventListener('input', runParse);
$('q').addEventListener('keyup', updateGhost);
$('q').addEventListener('click', updateGhost);
$('q').addEventListener('keydown', e => {
  if (e.key === 'Tab' && state.suggestion && !e.shiftKey) {
    e.preventDefault();
    acceptGhost();
    return;
  }
  if (e.key === 'ArrowRight' && state.suggestion) {
    const q = $('q');
    if (q.selectionStart === q.value.length) {
      e.preventDefault();
      acceptGhost();
      return;
    }
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (state.correction) { acceptCorrection(); return; }
    $('q').select();
  }
  if (e.key === 'Escape') { $('q').value = ''; runParse(); }
});
document.addEventListener('pointermove', onGlobalMove);
document.addEventListener('pointerup', onGlobalUp);
document.addEventListener('pointercancel', onGlobalUp);

$('examples').addEventListener('click', e => {
  const b = e.target.closest('.ex');
  if (!b) return;
  $('q').value = b.textContent;
  runParse();
  $('q').focus();
});

// Rotating placeholder
const placeholders = [
  'say when — try “yday to tmrw”',
  'try “next fri” or “first mon of march”',
  'try “in 3 weeks” or “last 30 days”',
  'try “may 12 – 19” or “q4 2026”',
  'try “10 days before xmas”',
  'try “2 mondays from now”',
];
let phI = 0;
setInterval(() => {
  if (document.activeElement !== $('q') && !$('q').value) {
    phI = (phI + 1) % placeholders.length;
    $('q').placeholder = placeholders[phI];
  }
}, 3200);

// init: empty — show prompt
runParse();
</script>
</body>
</html>
