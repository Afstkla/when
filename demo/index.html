<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>When · A Date Parser</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <div class="input-row" id="inputRow">
      <span class="prompt">›</span>
      <div class="qbox">
        <div class="shadow" aria-hidden="true"><span class="typed"></span><span class="ghost"></span></div>
        <input id="q" autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="say when — try “yday to tmrw” or “next fri”" />
      </div>
      <div class="locale-toggle" id="localeToggle" role="tablist" aria-label="language">
        <button type="button" class="loc-btn" data-locale="en" aria-pressed="true">EN</button>
        <button type="button" class="loc-btn" data-locale="nl" aria-pressed="false">NL</button>
      </div>
    </div>

    <div class="result" id="result"></div>
    <div class="sentence" id="sentence" aria-live="polite"></div>

    <div class="cal-strip" id="strip"></div>

    <div class="examples" id="examples"></div>

    <div class="meta-line">
      <span>When · a date parser</span>
      <span class="iso" id="isoLine">—</span>
    </div>
  </main>

  <script type="module" src="./main.ts"></script>
</body>
</html>
