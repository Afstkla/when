<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>When · A Date Parser</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <div class="input-row" id="inputRow">
      <span class="prompt">›</span>
      <div class="qbox">
        <div class="shadow" aria-hidden="true"><span class="typed"></span><span class="ghost"></span></div>
        <input id="q" autocomplete="off" autocapitalize="off" spellcheck="false" 
               placeholder="say when — try “yday to tmrw” or “next fri”" />
      </div>
    </div>

    <div class="result" id="result"></div>
    <div class="sentence" id="sentence" aria-live="polite"></div>

    <div class="cal-strip" id="strip"></div>

    <div class="examples" id="examples">
      <button type="button" class="ex">today</button>
      <button type="button" class="ex">tmrw</button>
      <button type="button" class="ex">yday to tmrw</button>
      <button type="button" class="ex">next fri</button>
      <button type="button" class="ex">in 3 weeks</button>
      <button type="button" class="ex">2 mondays from now</button>
      <button type="button" class="ex">last 30 days</button>
      <button type="button" class="ex">this weekend</button>
      <button type="button" class="ex">weekend after next</button>
      <button type="button" class="ex">first mon of march</button>
      <button type="button" class="ex">end of month</button>
      <button type="button" class="ex">week 20</button>
      <button type="button" class="ex">1st week of sept</button>
      <button type="button" class="ex">3rd day of next week</button>
      <button type="button" class="ex">q4 2026</button>
      <button type="button" class="ex">2nd decade of 21st century</button>
      <button type="button" class="ex">2020s</button>
      <button type="button" class="ex">christmas</button>
      <button type="button" class="ex">last christmas</button>
      <button type="button" class="ex">next thanksgiving</button>
      <button type="button" class="ex">10 days before xmas</button>
      <button type="button" class="ex">today + 10 days</button>
      <button type="button" class="ex">next fri + 3 days</button>
      <button type="button" class="ex">may 12 – 19</button>
      <button type="button" class="ex">5/12/26</button>
      <button type="button" class="ex">+45</button>
    </div>

    <div class="meta-line">
      <span>When · a date parser</span>
      <span class="iso" id="isoLine">—</span>
    </div>
  </main>

  <script type="module" src="./main.ts"></script>
</body>
</html>
